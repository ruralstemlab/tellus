<nav class="navbar">

  <!-- Logo -->
  <div class="logo">
    <img
      src="assets/logo/logo.png"
      alt="Tellus"
      class="logo-img"
      (click)="openAbout()"
    />
  </div>

  <!-- Menú principal -->
  <ul class="nav-menu">
    <li>
      <a routerLink="/dashboard" routerLinkActive="active">
        🏠 Inicio
      </a>
    </li>

    <li>
      <a routerLink="/gaian" routerLinkActive="active">
        🤖 Gaian
      </a>
    </li>

    <li>
      <a routerLink="/laboratorios" routerLinkActive="active">
        🧪 Laboratorios
      </a>
    </li>

    <li>
      <a routerLink="/biblioteca" routerLinkActive="active">
        📚 Biblioteca Viva
      </a>
    </li>
  </ul>

  <!-- Área de usuario -->
  <div class="user-area" tabindex="0">

    <div class="user-trigger">

      <span class="user-name">
        👤 {{ currentUser?.displayName || currentUser?.email || 'Henson Alberto' }}
      </span>

      <span class="user-arrow">
        ▼
      </span>

    </div>

    <div class="user-dropdown">

      <div class="dropdown-header">

        <span class="dropdown-name">
          {{ currentUser?.displayName || currentUser?.email || 'Henson Alberto' }}
        </span>

        <span class="dropdown-role">
          Profesor
        </span>

      </div>

      <div class="dropdown-divider"></div>

      <a
        class="dropdown-item"
        routerLink="/perfil">

        👤 Mi perfil

      </a>

      <a
        class="dropdown-item"
        routerLink="/configuracion">

        ⚙ Configuración

      </a>

      <div class="dropdown-divider"></div>

      <button
        type="button"
        class="dropdown-item logout-btn"
        (click)="logout()">

        🚪 Cerrar sesión

      </button>

    </div>

  </div>

</nav>

<app-about-modal></app-about-modal>
