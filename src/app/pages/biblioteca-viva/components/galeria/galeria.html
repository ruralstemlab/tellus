<div class="galeria-container">
  <h2>Galería de Proyectos</h2>
  
  <div *ngIf="loading" class="loading">
    Cargando proyectos...
  </div>

  <div *ngIf="!loading && projects.length === 0" class="empty">
    No hay proyectos publicados aún.
  </div>

  <div class="proyectos-grid" *ngIf="!loading && projects.length > 0">
    <div *ngFor="let project of projects" class="proyecto-card">
      <h3>{{ project.title }}</h3>
      <p><strong>Categoría:</strong> {{ project.category }}</p>
      <p><strong>Estudiante:</strong> {{ project.studentName }}</p>
      <p><strong>Institución:</strong> {{ project.institution }}</p>
      <button (click)="openProject(project)" class="btn-ver">
        Ver proyecto
      </button>
    </div>
  </div>
</div>
